<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WohnRoute | Ihr Zuhause. Ihr Weg.</title>
    <meta name="description" content="Almanya'da konut ve yerleşim rehberi. Kiralık daire arama, sözleşme, depozito hakları ve göçmenler için özel ipuçları.">

    <!-- Open Graph -->
    <meta property="og:title" content="WohnRoute | Ihr Zuhause. Ihr Weg.">
    <meta property="og:description" content="Almanya'da konut ve yerleşim rehberi. Kiralık daire arama, sözleşme, depozito hakları ve göçmenler için özel ipuçları.">
    <meta property="og:image" content="https://wohnroute.de/og-image.jpg">
    <meta property="og:url" content="https://wohnroute.de">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="WohnRoute">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="WohnRoute | Ihr Zuhause. Ihr Weg.">
    <meta name="twitter:description" content="Almanya'da konut ve yerleşim rehberi.">
    <meta name="twitter:image" content="https://wohnroute.de/og-image.jpg">

    <style>
        /* Tüm CSS aynen korundu (navy #04162E, orange #E67E22) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #04162E;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #ffffff;
            line-height: 1.5;
            padding: 20px;
        }
        .container {
            max-width: 680px;
            margin: 0 auto;
            background-color: #04162E;
            border-radius: 40px;
            overflow: hidden;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding: 24px 24px 12px 24px;
            border-bottom: 1px solid rgba(230,126,34,0.2);
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .logo span {
            color: #E67E22;
        }
        .badge {
            font-size: 0.75rem;
            background: rgba(230,126,34,0.15);
            padding: 6px 12px;
            border-radius: 60px;
            color: #E67E22;
            font-weight: 500;
        }
        .lang-buttons {
            display: flex;
            gap: 8px;
        }
        .lang-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(230,126,34,0.3);
            border-radius: 60px;
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }
        .lang-btn.active {
            background: #E67E22;
            color: #04162E;
            border-color: #E67E22;
        }
        .hero {
            padding: 32px 24px 24px 24px;
            text-align: left;
        }
        .hero h1 {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 24px;
            letter-spacing: -0.3px;
            color: #ffffff;
        }
        .feature-list {
            list-style: none;
            margin: 24px 0 0 0;
        }
        .feature-list li {
            margin-bottom: 16px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            font-size: 1rem;
            font-weight: 500;
        }
        .feature-list li::before {
            content: "✓";
            color: #E67E22;
            font-weight: bold;
            font-size: 1.2rem;
            display: inline-block;
            width: 24px;
        }
        .stats-section {
            margin: 20px 24px;
        }
        .stats-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }
        .stat-card {
            background: rgba(230,126,34,0.1);
            border-radius: 24px;
            padding: 20px 16px;
            text-align: center;
            flex: 1;
            min-width: 130px;
            border: 1px solid rgba(230,126,34,0.3);
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #E67E22;
            line-height: 1.2;
        }
        .stat-label {
            font-size: 0.85rem;
            color: #cfdfe9;
            margin-top: 6px;
        }
        .info-section {
            margin: 20px 24px;
        }
        .info-cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .info-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 18px 20px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
            border-left: 4px solid #E67E22;
        }
        .info-emoji {
            font-size: 2rem;
        }
        .info-text {
            flex: 1;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .info-text strong {
            color: #E67E22;
        }
        .beta-section {
            background: rgba(230,126,34,0.08);
            margin: 20px 24px 32px 24px;
            padding: 28px 24px;
            border-radius: 32px;
            text-align: center;
        }
        .beta-section h3 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            font-weight: 700;
            color: #ffffff;
        }
        .beta-section p {
            font-size: 0.9rem;
            color: #cfdfe9;
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 400px;
            margin: 0 auto;
        }
        .form-group input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(230,126,34,0.5);
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 1rem;
            color: #ffffff;
            outline: none;
            transition: all 0.2s ease;
        }
        .form-group input:focus {
            border-color: #E67E22;
            background: rgba(255,255,255,0.15);
        }
        .form-group input::placeholder {
            color: #8ba0b0;
        }
        .btn-primary {
            background: #E67E22;
            border: none;
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 700;
            color: #04162E;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            text-align: center;
        }
        .btn-primary:hover {
            background: #d35400;
            transform: scale(0.98);
        }
        .footer {
            padding: 24px 24px 32px 24px;
            text-align: center;
            border-top: 1px solid rgba(230,126,34,0.15);
            font-size: 0.7rem;
            color: #8ba0b0;
        }
        .footer p {
            margin-bottom: 6px;
        }
        .footer-note {
            font-size: 0.7rem;
            color: #5c7c8c;
        }
        @media (min-width: 560px) {
            .hero h1 {
                font-size: 2.6rem;
            }
            .form-group {
                flex-direction: row;
                gap: 12px;
                max-width: 480px;
            }
            .form-group input {
                flex: 1;
            }
            .btn-primary {
                width: auto;
                padding: 14px 32px;
            }
            .stats-grid {
                flex-wrap: nowrap;
            }
        }
        @media (max-width: 400px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .logo {
                font-size: 1.6rem;
            }
            .hero h1 {
                font-size: 1.9rem;
            }
            .stat-card {
                min-width: 100px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">Wohn<span>Route</span></div>
        <div class="badge">PACDI | Konut Rehberi</div>
        <div class="lang-buttons">
            <button class="lang-btn" data-lang="tr">🇹🇷 TÜRKÇE</button>
            <button class="lang-btn" data-lang="de">🇩🇪 DEUTSCH</button>
            <button class="lang-btn" data-lang="en">🇬🇧 ENGLISH</button>
        </div>
    </div>
    
    <div id="dynamicContent"></div>

    <div class="footer">
        <p>© 2026 PACDI — wohnroute.de</p>
        <p class="footer-note">Datenschutzfreundlich · Keine Speicherung</p>
    </div>
</div>

<script>
    // ES5 translations (içerik aynen korundu)
    var translations = {
        tr: {
            heroTitle: "Ihr Zuhause. Ihr Weg.",
            features: [
                "Kiralık daire arama rehberliği",
                "Mietvertrag (kira sözleşmesi) rehberi",
                "Kapora ve depozito hakları",
                "Göçmenler için özel ipuçları"
            ],
            statsTitle: "Rakamlarla Berlin Konut Piyasası",
            stats: [
                { number: "400-500", label: "İlk 1 saatteki başvuru (popüler semtlerde)" },
                { number: "%8-12", label: "Ortalama kira artışı (2024)" },
                { number: "3 Kat", label: "Maksimum depozito (Kaltmiete)" }
            ],
            didYouKnowTitle: "Bunu Biliyor muydun?",
            cards: [
                { emoji: "💰", text: "Depozitoyu (Kaution) peşin ödemek ZORUNDA DEĞİLSİNİZ. Kanun size 3 taksit hakkı tanır." },
                { emoji: "🏦", text: "Ev sahibi depozitoyu kendi hesabında TUTAMAZ. Sizin adınıza faiz getiren ayrı bir <strong>Kaution-Konto</strong>'da saklamak zorundadır." },
                { emoji: "📄", text: "<strong>SCHUFA</strong> belgesi olmadan iyi bir daireye başvurmak neredeyse imkansız. Almanya'ya gelir gelmez SCHUFA kaydı oluşturun. <strong>WBS</strong> belgesiyle sosyal konuta başvurabilirsiniz." }
            ],
            betaTitle: "Beta listesine katılın",
            betaDesc: "WohnRoute'u ilk deneyenlerden olun. Konut arayışınızda yanınızdayız.",
            namePlaceholder: "Adınız",
            emailPlaceholder: "E-posta adresiniz",
            buttonText: "Beta Listesine Katıl"
        },
        de: {
            heroTitle: "Ihr Zuhause. Ihr Weg.",
            features: [
                "Wohnungssuche-Beratung",
                "Mietvertrag-Ratgeber",
                "Kaution & Depot-Rechte",
                "Tipps für Migranten"
            ],
            statsTitle: "Berliner Wohnungsmarkt in Zahlen",
            stats: [
                { number: "400-500", label: "Bewerbungen in der 1. Stunde (in beliebten Bezirken)" },
                { number: "%8-12", label: "Durchschnittliche Mietsteigerung (2024)" },
                { number: "3 Kaltmieten", label: "Maximale Kaution" }
            ],
            didYouKnowTitle: "Wussten Sie schon?",
            cards: [
                { emoji: "💰", text: "Sie sind NICHT verpflichtet, die Kaution sofort komplett zu zahlen. Das Gesetz gewährt Ihnen <strong>drei Raten</strong>." },
                { emoji: "🏦", text: "Der Vermieter darf die Kaution NICHT auf seinem privaten Konto verwahren. Er muss sie auf einem <strong>verzinsten Kautionskonto</strong> anlegen, das auf Ihren Namen läuft." },
                { emoji: "📄", text: "Ohne <strong>SCHUFA</strong>-Auskunft ist die Bewerbung auf eine gute Wohnung fast unmöglich. Kümmern Sie sich direkt nach Ihrer Ankunft in Deutschland um eine SCHUFA-Selbstauskunft. Mit einem <strong>WBS</strong> können Sie eine Sozialwohnung beantragen." }
            ],
            betaTitle: "Beta-Liste beitreten",
            betaDesc: "Seien Sie einer der Ersten, die WohnRoute nutzen. Wir begleiten Sie bei Ihrer Wohnungssuche.",
            namePlaceholder: "Ihr Name",
            emailPlaceholder: "E-Mail-Adresse",
            buttonText: "Beta-Liste beitreten"
        },
        en: {
            heroTitle: "Your home. Your way.",
            features: [
                "Apartment search guidance",
                "Rental contract guide",
                "Deposit & security rights",
                "Special tips for newcomers"
            ],
            statsTitle: "Berlin Housing Market in Numbers",
            stats: [
                { number: "400-500", label: "Applications within 1st hour (in popular districts)" },
                { number: "8-12%", label: "Average rent increase (2024)" },
                { number: "3x cold rent", label: "Maximum deposit" }
            ],
            didYouKnowTitle: "Did you know?",
            cards: [
                { emoji: "💰", text: "You are NOT required to pay the entire deposit upfront. The law allows you to pay in <strong>three installments</strong>." },
                { emoji: "🏦", text: "The landlord CANNOT keep the deposit in their personal account. They must place it in a separate <strong>interest-bearing deposit account</strong> in your name." },
                { emoji: "📄", text: "Applying for a good apartment without a <strong>SCHUFA</strong> report is nearly impossible. Request your SCHUFA self-report as soon as you arrive in Germany. With a <strong>WBS</strong> certificate you can apply for social housing." }
            ],
            betaTitle: "Join the Beta List",
            betaDesc: "Be among the first to experience WohnRoute. We'll help you navigate your housing search.",
            namePlaceholder: "Your name",
            emailPlaceholder: "Email address",
            buttonText: "Join Beta List"
        }
    };

    var currentLang = "tr";

    function detectLanguage() {
        var userLang = navigator.language || navigator.userLanguage;
        if (userLang.indexOf("de") === 0) return "de";
        if (userLang.indexOf("en") === 0) return "en";
        return "tr";
    }

    function renderContent(lang) {
        var t = translations[lang];
        if (!t) return;

        var statsHtml = '<div class="stats-section">' +
            '<h2 style="font-size:1.3rem; margin-bottom:16px;">📊 ' + t.statsTitle + '</h2>' +
            '<div class="stats-grid">';
        for (var i = 0; i < t.stats.length; i++) {
            statsHtml += '<div class="stat-card">' +
                '<div class="stat-number">' + t.stats[i].number + '</div>' +
                '<div class="stat-label">' + t.stats[i].label + '</div>' +
                '</div>';
        }
        statsHtml += '</div></div>';

        var infoHtml = '<div class="info-section">' +
            '<h2 style="font-size:1.3rem; margin-bottom:16px;">💡 ' + t.didYouKnowTitle + '</h2>' +
            '<div class="info-cards">';
        for (var j = 0; j < t.cards.length; j++) {
            infoHtml += '<div class="info-card">' +
                '<div class="info-emoji">' + t.cards[j].emoji + '</div>' +
                '<div class="info-text">' + t.cards[j].text + '</div>' +
                '</div>';
        }
        infoHtml += '</div></div>';

        var featureItems = '';
        for (var k = 0; k < t.features.length; k++) {
            featureItems += '<li>' + t.features[k] + '</li>';
        }

        var heroHtml = '<div class="hero">' +
            '<h1>' + t.heroTitle + '</h1>' +
            '<ul class="feature-list">' + featureItems + '</ul>' +
            '</div>';

        var formHtml = '<div class="beta-section">' +
            '<h3>📧 ' + t.betaTitle + '</h3>' +
            '<p>' + t.betaDesc + '</p>' +
            '<form id="betaForm" onsubmit="return submitBeta(event)">' +
            '<div class="form-group">' +
            '<input type="text" id="name" name="name" placeholder="' + t.namePlaceholder + '" required>' +
            '<input type="email" id="email" name="email" placeholder="' + t.emailPlaceholder + '" required>' +
            '<button type="submit" class="btn-primary">' + t.buttonText + '</button>' +
            '</div>' +
            '</form>' +
            '</div>';

        var fullHtml = heroHtml + statsHtml + infoHtml + formHtml;
        document.getElementById("dynamicContent").innerHTML = fullHtml;

        var btns = document.querySelectorAll('.lang-btn');
        for (var i = 0; i < btns.length; i++) {
            if (btns[i].getAttribute('data-lang') === lang) {
                btns[i].classList.add('active');
            } else {
                btns[i].classList.remove('active');
            }
        }
    }

    function setLanguage(lang) {
        currentLang = lang;
        renderContent(lang);
    }

    function submitBeta(event) {
        event.preventDefault();
        var nameInput = document.getElementById('name');
        var emailInput = document.getElementById('email');
        if (nameInput && emailInput && nameInput.value.trim() !== '' && emailInput.value.trim() !== '') {
            var t = translations[currentLang];
            alert(t.buttonText === "Beta Listesine Katıl" ? "Teşekkürler! Size ulaşacağız." :
                  (currentLang === "de" ? "Vielen Dank! Wir melden uns." : "Thank you! We'll be in touch."));
            nameInput.value = '';
            emailInput.value = '';
        } else {
            alert(currentLang === "tr" ? "Lütfen adınızı ve e-posta adresinizi giriniz." :
                  (currentLang === "de" ? "Bitte geben Sie Ihren Namen und Ihre E-Mail-Adresse ein." :
                   "Please enter your name and email address."));
        }
        return false;
    }

    var initialLang = detectLanguage();
    setLanguage(initialLang);

    var langBtns = document.querySelectorAll('.lang-btn');
    for (var i = 0; i < langBtns.length; i++) {
        langBtns[i].addEventListener('click', function(e) {
            var lang = this.getAttribute('data-lang');
            setLanguage(lang);
        });
    }
</script>
</body>
</html>
